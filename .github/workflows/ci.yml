name: CI

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type check & unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: deno check — scheduling-core
        working-directory: supabase/functions/_shared/scheduling-core
        run: deno check index.ts

      - name: deno lint — scheduling-core
        working-directory: supabase/functions/_shared/scheduling-core
        run: deno lint

      - name: Unit tests — scheduling-core
        working-directory: supabase/functions/_shared/scheduling-core
        run: deno task test

      - name: Unit tests — llm-agent-api (handlers + helpers)
        run: |
          deno test --allow-all --no-check \
            supabase/functions/llm-agent-api/_tests/chat-unit.test.ts \
            supabase/functions/llm-agent-api/_tests/validate-config.test.ts \
            supabase/functions/llm-agent-api/_tests/validate-config-smoke.test.ts \
            supabase/functions/llm-agent-api/_tests/schema-validation.test.ts

      - name: Smoke script — syntax check
        run: bash -n supabase/functions/llm-agent-api/_tests/smoke-prod.sh

      - name: Coverage — scheduling-core
        working-directory: supabase/functions/_shared/scheduling-core
        run: |
          deno test --allow-all --coverage=cov_profile \
            use-cases repositories interpreters
          deno coverage cov_profile --exclude='\.test\.ts$' || true

      - name: Coverage — llm-agent-api
        run: |
          deno test --allow-all --no-check --coverage=cov_profile_llm \
            supabase/functions/llm-agent-api/_tests/chat-unit.test.ts \
            supabase/functions/llm-agent-api/_tests/validate-config.test.ts \
            supabase/functions/llm-agent-api/_tests/schema-validation.test.ts
          deno coverage cov_profile_llm --exclude='\.test\.ts$' || true
